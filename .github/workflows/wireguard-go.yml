name: wireguard-go

on:
  schedule:
    - cron: "57 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Check upstream and build+publish if new
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tools/wireguard-go/publish.sh

      - name: Regenerate README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/render-readme.sh

      - name: Commit go.mod/go.sum + README if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: bump wireguard-go, regenerate README"
          git push
